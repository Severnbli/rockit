name: pr-churn-analysis
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  churn:
    if: ${{ github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect git data
        run: |
          BASE_REF="${{ github.base_ref }}"
          git log --no-merges --pretty=format: --name-only origin/${BASE_REF}..HEAD \
            | grep -v '^$' | sort | uniq -c | sort -rn > /tmp/churn.txt

      - name: Post Churn Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/churn.txt', 'utf8').trim().split('\n').filter(Boolean);

            const files = raw.map(line => {
              const match = line.trim().match(/^(\d+)\s+(.+)$/);
              return match ? { count: parseInt(match[1]), file: match[2] } : null;
            }).filter(Boolean);

            const highChurn = files.filter(f => f.count >= 7);
            const maxCount = files[0]?.count ?? 1;
            const bar = n => {
              const filled = Math.round((n / maxCount) * 10);
              return '█'.repeat(filled) + '░'.repeat(10 - filled);
            };

            const top10 = files.slice(0, 10);

            const body = [
              '## 🔥 Churn Analysis',
              '_How many times each file was modified across commits_',
              '',
              `| File | Modifications | Heat |`,
              `|------|--------------|------|`,
              ...top10.map(f => `| \`${f.file}\` | ${f.count} | ${bar(f.count)} |`),
              '',
              highChurn.length > 0
                ? `⚠️ **${highChurn.length} file(s) modified 7+ times** — may indicate unclear requirements or rework: ${highChurn.map(f => `\`${f.file}\``).join(', ')}`
                : '✅ No high-churn files detected.',
            ].join('\n');

            const marker = '<!-- pr-insights-churn -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: marker + '\n' + body,
              });
            }
