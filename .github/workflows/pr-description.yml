name: pr-commit-history
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  pull-requests: write
jobs:
  enrich:
    if: ${{ github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Collect commit messages
        id: commits
        run: |
          BASE_REF="${{ github.base_ref }}"
          COMMITS=$(git log --reverse --pretty=format:"- %s" origin/${BASE_REF}..HEAD)
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const commits = process.env.COMMITS || "_No commits found._";
            const addition = [
              "## Commit history",
              commits,
            ].join("\n");
            const pullNumber = context.payload.pull_request.number;
            const currentBody = context.payload.pull_request.body || "";
            const addition_text = currentBody.includes("## Commit history")
              ? currentBody.replace(/## Commit history[\s\S]*$/, addition)
              : currentBody + "\n\n" + addition;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              body: addition_text
            });
