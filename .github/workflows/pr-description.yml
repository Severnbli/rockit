name: PR Description

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  enrich:
    if: ${{ github.base_ref == 'main' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commit messages
        id: commits
        run: |
          BASE_REF="${{ github.base_ref || 'main' }}"
          COMMITS=$(git log --pretty=format:"- %s" origin/${BASE_REF}..HEAD)
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const commits = process.env.COMMITS || "_No commits found._";

            const addition = [
              "## Commit history",
              commits,
            ].join("\n");

            const current = context.payload.pull_request.body || "";

            if (current.includes("## Commit history")) {
              const updated = current.replace(
                /## Commit history[\s\S]*$/,
                addition
              );
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: updated
              });
            } else {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                body: current + "\n\n" + addition
              });
            }
