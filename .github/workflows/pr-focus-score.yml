name: pr-focus-score
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  focus:
    if: ${{ github.base_ref == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect git data
        run: |
          BASE_REF="${{ github.base_ref }}"
          git diff --name-only origin/${BASE_REF}..HEAD \
            | xargs -I{} dirname {} | sort -u > /tmp/dirs.txt

      - name: Post Focus Score
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dirs = fs.readFileSync('/tmp/dirs.txt', 'utf8').trim().split('\n').filter(Boolean);

            const rootDirs = [...new Set(dirs.map(d => d === '.' ? '(root)' : d.split('/')[0]))];
            const count = rootDirs.length;

            const verdict = count <= 2 ? '🎯 Highly focused — touches very few areas'
              : count <= 4 ? '✅ Reasonably focused'
              : count <= 7 ? '⚠️ Somewhat broad — consider splitting if unrelated'
              : '🚨 Very broad — this PR touches many unrelated areas';

            const body = [
              '## 🎯 Focus Score',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| 📂 Top-level directories touched | ${count} |`,
              `| 🗂️ Directories | ${rootDirs.map(d => `\`${d}\``).join(', ')} |`,
              '',
              verdict,
            ].join('\n');

            const marker = '<!-- pr-insights-focus -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: marker + '\n' + body,
              });
            }
